name: RAPTOR GEOGRAFIA — Update

on:
  schedule:
    - cron: '0 8 * * 1-5'    # 10:00 CET
    - cron: '0 10 * * 1-5'   # 12:00 CET
    - cron: '0 14 * * 1-5'   # 16:00 CET
    - cron: '30 16 * * 1-5'  # 18:30 CET
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt --break-system-packages -q

      - name: Run RAPTOR GEOGRAFIA
        run: python raptor_geografia.py

      - name: Commit & push
        run: |
          git config user.name  "raptor-bot"
          git config user.email "raptor-bot@users.noreply.github.com"
          git add geografia.json portfolio_state.json data/charts/
          git diff --staged --quiet || git commit -m "🌍 Geografia update — $(date -u +'%d/%m/%Y %H:%M') UTC"
          git pull --rebase
          git push
